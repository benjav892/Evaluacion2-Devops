services:
  spring-app:
    build:
      context: .
      dockerfile: Dockerfile.multistage
    image: ghcr.io/benjav892/evaluacion2-devops:latest
    container_name: spring-app-duoc
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/greetings"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s