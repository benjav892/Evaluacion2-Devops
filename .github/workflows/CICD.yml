# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Spring Boot App CI/CD

on:
  workflow_dispatch:

jobs:
  CICD:

    runs-on: ubuntu-latest

    steps:
    # Para chequear que podemos llamar a las variables de nuestro repo
    - name: Print GH Variable
      run: echo ${{ vars.DOMAIN }}
    # Nos traemos el fuente del repositorio
    - uses: actions/checkout@v4
    # Instalamos Java 21 en el runner
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    
    # If your project uses Gradle, switch cache to "gradle" above.
    # You may also add explicit build steps (mvn -q -DskipTests package / ./gradlew build)
    # if your dependency resolution requires it.
    - name: Install Snyk CLI
      run: npm install -g snyk

    - name: Authenticate Snyk CLI
      env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      run: |
          snyk auth "$SNYK_TOKEN"

    - name: Run Snyk test (JSON + SARIF)
      env:
          # Optional (uncomment if you use it):
          # SNYK_ORG: ${{ vars.SNYK_ORG }}
          # SNYK_ORG: ${{ secrets.SNYK_ORG }}
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      run: |
          mkdir -p snyk-reports
          # JSON report
          snyk test \
            --all-projects \
            --json-file-output=snyk-reports/snyk-java-deps.json \
            || true
          # SARIF report
          snyk test \
            --all-projects \
            --sarif-file-output=snyk-reports/snyk-java-deps.sarif \
            || true

    - name: Upload Snyk reports (artifacts)
      uses: actions/upload-artifact@v4
      with:
          name: snyk-reports
          path: snyk-reports/
          if-no-files-found: error
          retention-days: 14
    
    - name: Build with Maven
      run: mvn clean package
      

          
    

     

      


